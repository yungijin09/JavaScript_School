<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 1. 할당 연산자
      let x = 1;
      let y = x;

      x = x + y;
      console.log(x); // 2

      x = x - y;
      console.log(x); // 1

      x = x * y;
      console.log(x); // 1

      x = x / y;
      console.log(x); // 1

      x = 5;
      y = 2;
      let z = x % y;
      console.log(z); // 1

      x = 3;
      y = 2;
      z = x ** y;
      console.log(z); // 9

      // 2. 복합 할당 연산자 : +=, -=, *=, /=, %=
      x = 3;
      y = 4;

      console.log((x += y)); // x = 7
      console.log((x -= y)); // x = 3
      console.log((x *= y)); // x = 12
      console.log((x /= y)); // x = 3
      console.log((x %= y)); // x = 3

      // 3. 비교연산자: 데이터의 값을 비교
      // <, >, <=, >=, ==, ===, !=, !==
      x = 3;
      console.log(typeof x);
      y = "3";
      console.log(typeof y);
      console.log(x == y); // true, 값만 비교 => 유연성 => 장점, 단점
      console.log(x === y); // false, 값 + 타입까지 비교

      console.log(x != y); // false
      console.log(x !== y); // true

      // 4. 산술연산자: ++(증가), --(감소), +(숫자화), -(단항부정: 부호바꾸기)
      x = 5;
      y = x++; // y = x 실행 한 뒤 x++
      console.log(x); // 6
      console.log(y); // 5

      y = --x;
      console.log(x); // 5
      console.log(y); // 5

      y = x--;
      console.log(x); // 4
      console.log(y); // 5

      x = -3;
      console.log(x); // -3
      console.log(-x); // 3

      x = "7";
      y = +x; // 숫자화
      console.log(typeof x); // string
      console.log(typeof y); // number

      console.log(x);
      console.log(y);
      console.log(x === y); // false

      //prompt로 두 수를 입력받아 합을 구하는 코드 작성
      //   let num1 = +(prompt("x 값 입력"));
      //   let num2 = +(prompt("y 값 입력"));
      //   console.log(num1 + num2);

      // 5. 논리연산자 : 여러 조건이 함께 있을 때 참, 거짓을 판단하는 것    => &&(AND : 둘 다 참이여야 true), ||(OR : 하나라도 참이면 true)
      let o = true && false; // false
      console.log(o);
      o = 3 > 2 && 4 > 7; // false
      console.log(o);
      o = 3 > 2 && 8 > 7; // true
      console.log(o);
      o = true || false; // true
      console.log(o);
      o = 3 > 2 || 4 > 7; // true
      console.log(o);
      o = 3 > 2 || 8 > 7; // true
      console.log(o);
      o = 3 > 4 || 4 < 2 || 2 > 3; // false
      console.log(o);

      // 6. 문자열 연산자 : +(concate)
      let firstName = "John";
      let lastName = "Bacon";
      let fullName = firstName + lastName;
      console.log(fullName);

      // 7. 삼항연산자 : 조건 ? 참 : 거짓 => 중첩 가능
      let age = 18;
      let isAdult = age >= 20 ? "성인" : "미성년자";
      console.log(isAdult);

      // 활용 : 90점 이상이면 "A", 80점 이상이면 "B", 70점 이상이면 "C", 60점 이상이면 "D", 모두 아니면 "E"
      //   let score = +prompt("점수 입력");
      //   let grade = (score >= 90) ? "A" :
      //                 (score >= 80) ? "B" :
      //                     (score >= 70) ? "C" :
      //                         (score >= 60) ? "D" :
      //                             "E";
      //   console.log(grade);
    </script>
  </body>
</html>
