<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /* for ~ in : 객체에서 많이 사용, 
        배열에서 사용할 경우 -> 초기화, 조건, 증가식 생략 가능
        
        */

      // 1. 배열에서 사용
      let brands = [
        "애플",
        "구글",
        "마이크로소프트",
        "삼성",
        "아마존",
        "테슬라",
      ];
      for (const i in brands) {
        console.log(i, brands[i]);
      }

      // 2. 객체에서 사용
      // 2-1 키 출력
      // for(const key in person){
      //     console.log(key);
      // }
      // 2-2 값 출력
      // for(const key in person){
      //     console.log(key,":",person[key]);
      // }
      //알고 싶은 키를 입력받고, 키에 대한 값을 출력하는 코드(빈 칸은 체크)
      let person = {
        name: "홍길동",
        age: 22,
        tel: "010-0000-1111",
        city: "Seoul",
      };
      let inputKey = prompt("값을 알고 싶은 키를 입력하세요");
      let flag = false;
      for (const key in person) {
        if (inputKey === key) {
          console.log(key, ":", person[key]);
          flag = true;
          break;
        }
      }
      if (!flag) {
        console.log("올바른 값을 입력하세요");
      }
    </script>
  </body>
</html>
