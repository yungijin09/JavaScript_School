<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let age = prompt("나이를 입력하세요");
      let price = 0;

      if (age) {                        // age가 존재 할 때
        if (age < 70 && age >= 18) {
          price = 1000;
        } else if (age >= 12) {
          price = 700;
        } else if (age > 6) {
          price = 450;
        }
        console.log(age + "세 : " + price + "원");
      } else {
        console.log("올바른 값을 입력하세요");
      }
    </script>
  </body>
</html>
